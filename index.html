<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Dashboard - Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6f9;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 { color: #1e3c72; margin: 0 0 10px 0; }
        p { color: #7f8c8d; margin: 0; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Hello World!</h1>
        <p>Die Verbindung vom Pi 2 zu Cloudflare steht. 🚀</p>
    </div>
</body>
</html>
