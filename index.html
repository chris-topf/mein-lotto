<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Dashboard - Zentrale</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .main-container { width: 100%; max-width: 1150px; display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        @media (max-width: 768px) { .main-container { grid-template-columns: 1fr; } }
        .sidebar { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); height: calc(100vh - 40px); position: sticky; top: 20px; display: flex; flex-direction: column; }
        .sidebar h2 { font-size: 15px; color: #1e293b; text-transform: uppercase; margin-top: 0; margin-bottom: 15px; border-bottom: 2px solid #3b82f6; padding-bottom: 5px; }
        .archive-list { overflow-y: auto; flex-grow: 1; padding-right: 4px; }
        .archive-link { display: flex; align-items: center; padding: 10px 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; text-decoration: none; color: #334155; margin-bottom: 8px; font-weight: 500; font-size: 14px; transition: all 0.2s; }
        .archive-link:hover { background: #e0f2fe; border-color: #7dd3fc; color: #0369a1; transform: translateX(3px); }
        .link-action { margin-left: auto; font-size: 11px; color: #94a3b8; }
        .calendar-icon { margin-right: 8px; }
        .content-area { background: white; height: calc(100vh - 40px); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
<div class="main-container">
    <div class="sidebar">
        <h2>Ziehungs-Archiv</h2>
        <div class="archive-list">
            
            <a href="archiv/2026-06-26.html" target="dashboard-view" class="archive-link">
                <span class="calendar-icon">📅</span>
                <span class="link-date">2026-06-26</span>
                <span class="link-action">Anzeigen →</span>
            </a>
        </div>
    </div>
    <div class="content-area">
        <iframe src="archiv/2026-06-26.html" name="dashboard-view"></iframe>
    </div>
</div>
</body>
</html>
